# 服务名称
spring:
  application:
    name: beacon-smsgateway

  # 多环境
  profiles:
    active: dev
  # nacos注册中心地址
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.88.128:8848
      # nacos配置中心地址:
      config:
        server-addr: 192.168.88.128:8848
        file-extension: yml
        # beacon-api-dev.yml

cache:
  client:
    auth:
      enabled: true
      caller: beacon-smsgateway
      secret: cache_smsgateway_secret

cmpp:
  state:
    submit-ttl-seconds: 600
    deliver-ttl-seconds: 86400

