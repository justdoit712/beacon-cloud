<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" fill="none">
  <!-- Background blobs -->
  <ellipse cx="200" cy="230" rx="160" ry="20" fill="#edf3f9" opacity="0.7"/>
  <circle cx="320" cy="60" r="40" fill="#e8f4fd" opacity="0.4"/>
  <circle cx="80" cy="40" r="28" fill="#e8fdf0" opacity="0.3"/>

  <!-- Server / monitoring panel -->
  <rect x="40" y="60" width="140" height="100" rx="8" fill="#ffffff" stroke="#dce4ee" stroke-width="1.5"/>
  <rect x="52" y="74" width="80" height="8" rx="4" fill="#3c8dbc" opacity="0.7"/>
  <rect x="52" y="90" width="116" height="4" rx="2" fill="#edf1f5"/>
  <rect x="52" y="100" width="96" height="4" rx="2" fill="#edf1f5"/>
  <rect x="52" y="110" width="108" height="4" rx="2" fill="#edf1f5"/>
  <!-- KPI bars -->
  <rect x="52" y="124" width="28" height="24" rx="3" fill="#3c8dbc" opacity="0.15"/>
  <rect x="56" y="138" width="20" height="10" rx="2" fill="#3c8dbc" opacity="0.6"/>
  <rect x="86" y="124" width="28" height="24" rx="3" fill="#00a65a" opacity="0.15"/>
  <rect x="90" y="132" width="20" height="16" rx="2" fill="#00a65a" opacity="0.6"/>
  <rect x="120" y="124" width="28" height="24" rx="3" fill="#f39c12" opacity="0.15"/>
  <rect x="124" y="136" width="20" height="12" rx="2" fill="#f39c12" opacity="0.6"/>

  <!-- Message / SMS flow -->
  <rect x="220" y="50" width="150" height="80" rx="8" fill="#ffffff" stroke="#dce4ee" stroke-width="1.5"/>
  <!-- Envelope icon -->
  <rect x="236" y="66" width="32" height="22" rx="3" fill="#3c8dbc" opacity="0.12"/>
  <path d="M238 68 L252 80 L266 68" stroke="#3c8dbc" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.7"/>
  <!-- Message lines -->
  <rect x="276" y="68" width="78" height="4" rx="2" fill="#edf1f5"/>
  <rect x="276" y="78" width="60" height="4" rx="2" fill="#edf1f5"/>
  <!-- Status indicators -->
  <circle cx="244" cy="104" r="5" fill="#00a65a" opacity="0.7"/>
  <rect x="256" y="101" width="44" height="4" rx="2" fill="#d9dee5"/>
  <circle cx="244" cy="118" r="5" fill="#00a65a" opacity="0.7"/>
  <rect x="256" y="115" width="36" height="4" rx="2" fill="#d9dee5"/>

  <!-- Connection lines / flow arrows -->
  <path d="M180 110 Q200 110 220 90" stroke="#3c8dbc" stroke-width="1.5" stroke-dasharray="4 3" fill="none" opacity="0.4"/>
  <circle cx="200" cy="100" r="3" fill="#3c8dbc" opacity="0.4"/>

  <!-- Beacon tower center -->
  <rect x="180" y="160" width="40" height="52" rx="3" fill="#2f6f92"/>
  <polygon points="174,160 200,136 226,160" fill="#3c8dbc"/>
  <!-- Flame -->
  <ellipse cx="200" cy="130" rx="10" ry="14" fill="#f39c12" opacity="0.85"/>
  <ellipse cx="200" cy="127" rx="6" ry="9" fill="#ffcc02"/>
  <ellipse cx="200" cy="124" rx="3" ry="5" fill="#fff" opacity="0.7"/>
  <!-- Tower windows -->
  <rect x="188" y="168" width="10" height="12" rx="2" fill="#8fd0ff" opacity="0.5"/>
  <rect x="202" y="168" width="10" height="12" rx="2" fill="#8fd0ff" opacity="0.5"/>
  <rect x="188" y="186" width="10" height="12" rx="2" fill="#8fd0ff" opacity="0.5"/>
  <rect x="202" y="186" width="10" height="12" rx="2" fill="#8fd0ff" opacity="0.5"/>

  <!-- Signal waves from tower -->
  <path d="M230 148 Q238 138 230 128" stroke="#3c8dbc" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.4"/>
  <path d="M240 152 Q250 138 240 124" stroke="#3c8dbc" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.25"/>
  <path d="M170 148 Q162 138 170 128" stroke="#3c8dbc" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.4"/>
  <path d="M160 152 Q150 138 160 124" stroke="#3c8dbc" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.25"/>

  <!-- Mobile devices receiving -->
  <rect x="60" y="170" width="28" height="44" rx="4" fill="#ffffff" stroke="#c5ced8" stroke-width="1.2"/>
  <rect x="64" y="178" width="20" height="24" rx="2" fill="#f0f5fa"/>
  <circle cx="74" cy="208" r="2.5" fill="#c5ced8"/>
  <rect x="312" y="150" width="28" height="44" rx="4" fill="#ffffff" stroke="#c5ced8" stroke-width="1.2"/>
  <rect x="316" y="158" width="20" height="24" rx="2" fill="#f0f5fa"/>
  <circle cx="326" cy="188" r="2.5" fill="#c5ced8"/>

  <!-- Flying message icons -->
  <rect x="100" y="176" width="16" height="11" rx="2" fill="#3c8dbc" opacity="0.2"/>
  <path d="M101 177 L108 183 L115 177" stroke="#3c8dbc" stroke-width="1" fill="none" opacity="0.4"/>
  <rect x="284" y="160" width="16" height="11" rx="2" fill="#3c8dbc" opacity="0.2"/>
  <path d="M285 161 L292 167 L299 161" stroke="#3c8dbc" stroke-width="1" fill="none" opacity="0.4"/>
</svg>
