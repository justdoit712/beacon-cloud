  <path d="M50 76 Q42 56 50 36" stroke="#3c8dbc" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.35"/>
  <path d="M38 80 Q28 54 38 28" stroke="#3c8dbc" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.2"/>
  <path d="M138 72 Q144 58 138 44" stroke="#3c8dbc" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.5"/>
  <path d="M150 76 Q158 56 150 36" stroke="#3c8dbc" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.35"/>
  <path d="M162 80 Q172 54 162 28" stroke="#3c8dbc" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.2"/>
  <!-- Cloud -->
  <ellipse cx="100" cy="34" rx="28" ry="12" fill="#e8f4fd" opacity="0.7"/>
  <ellipse cx="84" cy="38" rx="16" ry="9" fill="#e8f4fd" opacity="0.5"/>
  <ellipse cx="116" cy="38" rx="16" ry="9" fill="#e8f4fd" opacity="0.5"/>
