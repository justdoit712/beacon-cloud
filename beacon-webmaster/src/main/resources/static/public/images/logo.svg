<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Beacon tower base -->
  <rect x="75" y="120" width="50" height="60" rx="4" fill="#2f6f92"/>
  <rect x="85" y="130" width="12" height="16" rx="2" fill="#8fd0ff" opacity="0.6"/>
  <rect x="103" y="130" width="12" height="16" rx="2" fill="#8fd0ff" opacity="0.6"/>
  <rect x="85" y="152" width="12" height="16" rx="2" fill="#8fd0ff" opacity="0.6"/>
  <rect x="103" y="152" width="12" height="16" rx="2" fill="#8fd0ff" opacity="0.6"/>
  <!-- Tower top -->
  <polygon points="70,120 100,88 130,120" fill="#3c8dbc"/>
  <!-- Flame / beacon light -->
  <ellipse cx="100" cy="78" rx="14" ry="18" fill="#f39c12" opacity="0.9"/>
  <ellipse cx="100" cy="74" rx="8" ry="12" fill="#ffcc02"/>
  <ellipse cx="100" cy="70" rx="4" ry="7" fill="#ffffff" opacity="0.8"/>
