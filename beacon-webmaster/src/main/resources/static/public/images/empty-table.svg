<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 180" fill="none">
  <!-- Background shape -->
  <ellipse cx="120" cy="150" rx="90" ry="14" fill="#f0f5fa" opacity="0.8"/>
  <!-- Box / folder -->
  <path d="M70 70 L80 50 H160 L170 70 Z" fill="#dce4ee" stroke="#c5ced8" stroke-width="1"/>
  <rect x="64" y="70" width="112" height="70" rx="4" fill="#edf1f5" stroke="#c5ced8" stroke-width="1"/>
  <!-- Inner shadow -->
  <rect x="72" y="78" width="96" height="54" rx="3" fill="#f8fafc"/>
  <!-- Document lines (empty) -->
  <rect x="88" y="90" width="44" height="3" rx="1.5" fill="#d9dee5"/>
  <rect x="88" y="100" width="64" height="3" rx="1.5" fill="#d9dee5" opacity="0.6"/>
  <rect x="88" y="110" width="32" height="3" rx="1.5" fill="#d9dee5" opacity="0.4"/>
  <!-- Magnifying glass -->
  <circle cx="164" cy="56" r="16" stroke="#3c8dbc" stroke-width="2.5" fill="#f7fbff" opacity="0.8"/>
  <line x1="175" y1="68" x2="186" y2="79" stroke="#3c8dbc" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <!-- Question mark in glass -->
  <text x="159" y="62" font-family="Arial,sans-serif" font-size="16" font-weight="600" fill="#3c8dbc" opacity="0.5">?</text>
  <!-- Small decorative dots -->
  <circle cx="52" cy="64" r="3" fill="#3c8dbc" opacity="0.15"/>
  <circle cx="192" cy="88" r="2.5" fill="#f39c12" opacity="0.2"/>
  <circle cx="46" cy="100" r="2" fill="#00a65a" opacity="0.15"/>
</svg>
