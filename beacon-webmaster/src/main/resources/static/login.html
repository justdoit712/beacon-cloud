<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>烽火云短信平台</title>
    <!-- Tell the browser to be responsive to screen width -->
    <meta content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" name="viewport">
    <link rel="stylesheet" href="public/css/bootstrap.min.css">
    <link rel="stylesheet" href="public/css/font-awesome.min.css">
    <link rel="stylesheet" href="public/css/AdminLTE.min.css">
    <!-- AdminLTE Skins. Choose a skin from the css/skins
         folder instead of downloading all of them to reduce the load. -->
    <link rel="stylesheet" href="public/css/all-skins.min.css">
    <link rel="stylesheet" href="public/css/main.css">
    <link rel="stylesheet" href="public/css/theme.css">
    <!-- HTML5 Shim and Respond.js IE8 support of HTML5 elements and media queries -->
    <!-- WARNING: Respond.js doesn't work if you view the page via file:// -->
    <!--[if lt IE 9]>
    <script src="https://oss.maxcdn.com/html5shiv/3.7.3/html5shiv.min.js"></script>
    <script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
    <![endif]-->
</head>
<body class="hold-transition login-page login-theme-page">
<div class="login-box login-theme-box" id="rrapp" v-cloak>
    <div class="login-logo login-theme-logo">
        <span class="login-logo-subtitle">Webmaster Console</span>
        <b>烽火云短信平台</b>
    </div>
    <!-- /.login-logo -->
    <div class="login-box-body login-theme-card">
        <p class="login-box-msg login-theme-msg">用户登录</p>
        <div v-if="error" class="alert alert-danger alert-dismissible login-error-tip" role="alert" aria-live="assertive">
            <h4 class="login-error-text"><i class="fa fa-exclamation-triangle"></i> {{errorMsg}}</h4>
        </div>
        <div class="form-group has-feedback login-field">
            <label for="login-username" class="sr-only">账号</label>
            <input id="login-username" type="text" class="form-control" v-model="user.username" @keyup.enter="login" autocomplete="username" placeholder="账号">
            <span class="glyphicon glyphicon-user form-control-feedback"></span>
        </div>
        <div class="form-group has-feedback login-field">
            <label for="login-password" class="sr-only">密码</label>
            <input id="login-password" type="password" class="form-control" v-model="user.password" @keyup.enter="login" autocomplete="current-password" placeholder="密码">
            <span class="glyphicon glyphicon-lock form-control-feedback"></span>
        </div>
        <div class="form-group has-feedback login-field">
            <label for="login-captcha" class="sr-only">验证码</label>
            <input id="login-captcha" type="text" class="form-control" v-model="user.captcha" @keyup.enter="login" autocomplete="off" placeholder="验证码">
            <span class="glyphicon glyphicon-warning-sign form-control-feedback"></span>
        </div>
        <div class="form-group has-feedback login-captcha-row">
            <img alt="如果看不清楚，请单击图片刷新！" class="pointer login-captcha-img" :src="src" @click="refreshCode" @keyup.enter="refreshCode" tabindex="0">
            <button type="button" class="login-captcha-refresh" @click="refreshCode">点击刷新</button>
        </div>
        <div class="checkbox text-left login-remember-row">
            <label for="login-remember"><input id="login-remember" type="checkbox" v-model="user.rememberMe" value="true">记住我</label>
        </div>

        <div class="row login-action-row">
            <div class="col-xs-12">
                <button type="button" class="btn btn-primary btn-block btn-flat login-submit-btn" @click="login">登录</button>
            </div>
            <!-- /.col -->
        </div>
        <!-- /.social-auth-links -->

    </div>
    <!-- /.login-box-body -->
</div>
<!-- /.login-box -->
<script src="public/libs/jquery.min.js"></script>
<script src="public/libs/vue.min.js"></script>
<script src="public/libs/bootstrap.min.js"></script>
<script src="public/libs/jquery.slimscroll.min.js"></script>
<script src="public/libs/fastclick.min.js"></script>
<script src="public/libs/app.js"></script>
<script type="text/javascript">
    var vm = new Vue({
        el: '#rrapp',
        data: {
            user: {},
            error: false,
            errorMsg: '',
            src: '/sys/auth/captcha.jpg'
        },
        beforeCreate: function () {
            if (self != top) {
                top.location.href = self.location.href;
            }
        },
        methods: {
            refreshCode: function () {
                this.src = "/sys/auth/captcha.jpg?t=" + $.now();
            },
            login: function (event) {

                $.ajax({
                    type: "POST",
                    url: "sys/login",
                    data: JSON.stringify(vm.user),
                    dataType: "json",
                    contentType: "application/json",
                    cache: false,
                    success: function (result) {
                        if (result.code == 0) {//登录成功
                            parent.location.href = 'index.html';
                        } else {
                            vm.error = true;
                            vm.errorMsg = result.msg;

                            vm.refreshCode();
                        }
                    }
                });
            }
        }
    });
</script>
</body>
</html>
