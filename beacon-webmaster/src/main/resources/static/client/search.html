<!DOCTYPE html>
<html>
<head>
    <title>搜索短信</title>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" name="viewport">
    <link rel="stylesheet" href="../public/css/bootstrap.min.css">
    <link rel="stylesheet" href="../public/css/font-awesome.min.css">
    <link rel="stylesheet" href="../public/plugins/bootstrap-table/bootstrap-table.min.css">
    <link rel="stylesheet" href="../public/plugins/ztree/css/metroStyle/metroStyle.css">
    <link rel="stylesheet" href="../public/css/main.css">
    <link rel="stylesheet" href="../public/css/theme.css">
</head>
<body class="ops-page ops-page-wide">
<div id="dtapp" class="ops-page-container" v-cloak>

    <div class="ops-page-layout">
        <div class="panel panel-default ops-list-panel">
            <div class="panel-heading ops-list-heading">
                <div class="ops-heading-copy">
                    <span class="ops-panel-kicker">筛选工作台</span>
                    <span class="ops-list-title">查询条件</span>
                </div>
                <p class="ops-panel-note">组合关键字、手机号、发送时间和客户范围后执行查询，适合排查状态、运营商和错误原因。</p>
            </div>
            <div class="panel-body">
                <form id="formSearch" class="ops-filter-form" @submit.prevent="reload">
                    <div class="ops-filter-grid">
                        <div class="ops-filter-field">
                            <label for="content">关键字</label>
                            <input id="content" type="text" class="form-control" placeholder="请输入短信内容关键字">
                        </div>
                        <div class="ops-filter-field">
                            <label for="mobile">手机号</label>
                            <input id="mobile" type="text" class="form-control" placeholder="请输入手机号">
                        </div>
                        <div class="ops-filter-field">
                            <label for="clientID">公司</label>
                            <select id="clientID" class="form-control">
                                <option value="">请选择公司</option>
                                <option :value="item.id" v-for="item in sites">{{item.corpname}}</option>
                            </select>
                        </div>
                        <div class="ops-filter-field">
                            <label>发送时间</label>
                            <div class="ops-date-range">
                                <input id="starttime" type="date" class="form-control" aria-label="开始日期">
                                <input id="stoptime" type="date" class="form-control" aria-label="结束日期">
                            </div>
                            <p class="ops-form-help">时间为空时表示不过滤该条件；建议成对填写以缩小结果范围。</p>
                        </div>
                    </div>
                    <div class="ops-filter-actions">
                        <button type="button" class="btn btn-primary" @click="reload">
                            <span class="btn-text">查询</span>
                        </button>
                        <button type="button" class="btn btn-default ml-10" @click="resetForm">重置</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="ops-page-layout">
        <div class="panel panel-default ops-list-panel">
            <div class="panel-heading ops-list-heading">
                <div class="ops-heading-copy">
                    <span class="ops-panel-kicker">查询结果</span>
                    <span class="ops-list-title">短信搜索结果</span>
                </div>
                <p class="ops-panel-note">重点查看发送时间、状态、运营商、错误原因和原始内容，便于快速完成问题定位。</p>
            </div>
            <div class="panel-body">
                <div class="ops-table-wrap">
                    <table id="table" class="ops-table"></table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="../public/libs/jquery.min.js"></script>
<script src="../public/plugins/layer/layer.js"></script>
<script src="../public/libs/bootstrap.min.js"></script>
<script src="../public/libs/vue.min.js"></script>
<script src="../public/plugins/bootstrap-table/bootstrap-table.min.js"></script>
<script src="../public/plugins/bootstrap-table/locale/bootstrap-table-zh-CN.min.js"></script>
<script src="../public/plugins/ztree/jquery.ztree.all.min.js"></script>
<script src="../public/js/common.js"></script>
<script src="../public/js/client/search.js"></script>
</body>
</html>
