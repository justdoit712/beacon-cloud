<!DOCTYPE html>
<html>
<head>
    <title>SMS Send</title>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" name="viewport">
    <link rel="stylesheet" href="../public/css/bootstrap.min.css">
    <link rel="stylesheet" href="../public/css/font-awesome.min.css">
    <link rel="stylesheet" href="../public/plugins/bootstrap-table/bootstrap-table.min.css">
    <link rel="stylesheet" href="../public/plugins/ztree/css/metroStyle/metroStyle.css">
    <link rel="stylesheet" href="../public/css/main.css">
    <link rel="stylesheet" href="../public/css/index.css">
</head>
<body>
<div id="dtapp" v-cloak>
    <div class="panel panel-default">
        <div class="panel-heading">{{title}}</div>
        <form class="form-horizontal" onsubmit="return false;">
            <div class="form-group">
                <div class="col-sm-2 control-label">Client</div>
                <div class="col-sm-10">
                    <select class="form-control" v-model="sms.clientId">
                        <option disabled value="">Please select a client</option>
                        <option v-for="site in sites" :key="site.id" :value="site.id">{{site.corpname}}</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <div class="col-sm-2 control-label">Type</div>
                <div class="col-sm-10">
                    <select class="form-control" v-model.number="sms.state">
                        <option :value="0">Code</option>
                        <option :value="1">Notice</option>
                        <option :value="2">Marketing</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <div class="col-sm-2 control-label">Mobile</div>
                <div class="col-sm-10">
                    <textarea class="form-control"
                              v-model="sms.mobile"
                              rows="10"
                              placeholder="One mobile per line, or separated by comma/blank"></textarea>
                </div>
            </div>

            <div class="form-group">
                <div class="col-sm-2 control-label">Content</div>
                <div class="col-sm-10">
                    <textarea class="form-control" v-model="sms.content" rows="4"></textarea>
                </div>
            </div>

            <div class="form-group">
                <div class="col-sm-2 control-label"></div>
                <div class="col-sm-10">
                    <input type="button" class="btn btn-primary" @click="saveOrUpdate" value="Send SMS"/>
                </div>
            </div>
        </form>
    </div>
</div>

<script src="../public/libs/jquery.min.js"></script>
<script src="../public/plugins/layer/layer.js"></script>
<script src="../public/libs/bootstrap.min.js"></script>
<script src="../public/libs/vue.min.js"></script>
<script src="../public/libs/myindex.js"></script>
<script src="../public/plugins/bootstrap-table/bootstrap-table.min.js"></script>
<script src="../public/plugins/bootstrap-table/locale/bootstrap-table-zh-CN.min.js"></script>
<script src="../public/plugins/ztree/jquery.ztree.all.min.js"></script>
<script src="../public/js/common.js"></script>
<script src="../public/js/client/smssend.js"></script>
</body>
</html>
