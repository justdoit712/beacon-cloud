<!DOCTYPE html>
<html>
<head>
    <title>短信发送</title>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" name="viewport">
    <link rel="stylesheet" href="../public/css/bootstrap.min.css">
    <link rel="stylesheet" href="../public/css/font-awesome.min.css">
    <link rel="stylesheet" href="../public/plugins/bootstrap-table/bootstrap-table.min.css">
    <link rel="stylesheet" href="../public/plugins/ztree/css/metroStyle/metroStyle.css">
    <link rel="stylesheet" href="../public/css/main.css">
    <link rel="stylesheet" href="../public/css/theme.css">
</head>
<body class="ops-page">
<div id="dtapp" class="ops-page-container" v-cloak>
    <div class="ops-page-layout">
        <div class="panel panel-default page-form-layout ops-form-panel">
            <div class="panel-heading">{{title}}</div>
            <form class="form-horizontal ops-form" onsubmit="return false;">
                <div class="form-group">
                    <div class="col-sm-2 control-label">客户</div>
                    <div class="col-sm-10">
                        <select class="form-control" v-model="sms.clientId">
                            <option disabled value="">请选择客户</option>
                            <option v-for="site in sites" :key="site.id" :value="site.id">{{site.corpname}}</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <div class="col-sm-2 control-label">短信类型</div>
                    <div class="col-sm-10">
                        <select class="form-control" v-model.number="sms.state">
                            <option :value="0">验证码</option>
                            <option :value="1">通知</option>
                            <option :value="2">营销</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <div class="col-sm-2 control-label">手机号</div>
                    <div class="col-sm-10">
                        <textarea class="form-control"
                                  v-model="sms.mobile"
                                  rows="10"
                                  placeholder="每行一个手机号，支持逗号或空格分隔"></textarea>
                    </div>
                </div>

                <div class="form-group">
                    <div class="col-sm-2 control-label">短信内容</div>
                    <div class="col-sm-10">
                        <textarea class="form-control" v-model="sms.content" rows="4"></textarea>
                    </div>
                </div>

                <div class="form-group ops-form-actions">
                    <div class="col-sm-2 control-label"></div>
                    <div class="col-sm-10">
                        <button type="button" class="btn btn-primary" @click="saveOrUpdate">发送短信</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="../public/libs/jquery.min.js"></script>
<script src="../public/plugins/layer/layer.js"></script>
<script src="../public/libs/bootstrap.min.js"></script>
<script src="../public/libs/vue.min.js"></script>
<script src="../public/libs/myindex.js"></script>
<script src="../public/plugins/bootstrap-table/bootstrap-table.min.js"></script>
<script src="../public/plugins/bootstrap-table/locale/bootstrap-table-zh-CN.min.js"></script>
<script src="../public/plugins/ztree/jquery.ztree.all.min.js"></script>
<script src="../public/js/common.js"></script>
<script src="../public/js/client/smssend.js"></script>
</body>
</html>
