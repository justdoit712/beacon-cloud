<!DOCTYPE html>
<html>
<head>
    <title>客户管理</title>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" name="viewport">
    <link rel="stylesheet" href="../public/css/bootstrap.min.css">
    <link rel="stylesheet" href="../public/css/font-awesome.min.css">
    <link rel="stylesheet" href="../public/plugins/bootstrap-table/bootstrap-table.min.css">
    <link rel="stylesheet" href="../public/plugins/ztree/css/metroStyle/metroStyle.css">
    <link rel="stylesheet" href="../public/css/main.css">
    <link rel="stylesheet" href="../public/css/theme.css">
    <link rel="stylesheet" href="../public/css/index.css">
</head>
<body class="ops-page">
<div id="dtapp" class="ops-page-container" v-cloak>

    <div v-show="showList" class="ops-page-layout">
        <div class="panel panel-default ops-list-panel">
            <div class="panel-heading ops-list-heading">
                <span class="ops-list-title">客户列表</span>
            </div>
            <div class="panel-body">
                <div id="toolbar" class="ops-toolbar">
                    <button class="btn btn-success" type="button" @click="add">
                        <i class="fa fa-plus"></i>&nbsp;&nbsp;<span class="bold">新增</span>
                    </button>
                    <button class="btn btn-success" type="button" @click="update">
                        <i class="fa fa-pencil-square-o"></i>&nbsp;&nbsp;<span class="bold">修改</span>
                    </button>
                    <button class="btn btn-danger" type="button" @click="del">
                        <i class="fa fa-remove"></i>&nbsp;&nbsp;<span class="bold">删除</span>
                    </button>
                </div>
                <table id="table" class="ops-table"></table>
            </div>
        </div>
    </div>

    <div v-show="!showList" class="panel panel-default page-form-layout ops-form-panel">
        <div class="panel-heading">{{title}}</div>
        <form class="form-horizontal ops-form">
            <div class="form-group">
                <div class="col-sm-2 control-label">公司名称</div>
                <div class="col-sm-10">
                    <input type="text" class="form-control" :class="{'is-invalid': formErrors.corpname}" v-model="client.corpname" placeholder="公司名称"/>
                    <p class="ops-field-error" v-if="formErrors.corpname">{{formErrors.corpname}}</p>
                </div>
            </div>
            <div class="form-group">
                <div class="col-sm-2 control-label">公司地址</div>
                <div class="col-sm-10">
                    <input type="text" class="form-control" v-model="client.address" placeholder="公司地址"/>
                </div>
            </div>
            <div class="form-group">
                <div class="col-sm-2 control-label">联系人</div>
                <div class="col-sm-10">
                    <input type="text" class="form-control" :class="{'is-invalid': formErrors.linkman}" v-model="client.linkman" placeholder="联系人"/>
                    <p class="ops-field-error" v-if="formErrors.linkman">{{formErrors.linkman}}</p>
                </div>
            </div>
            <div class="form-group">
                <div class="col-sm-2 control-label">手机号</div>
                <div class="col-sm-10">
                    <input type="text" class="form-control" :class="{'is-invalid': formErrors.mobile}" v-model="client.mobile" placeholder="手机号"/>
                    <p class="ops-field-error" v-if="formErrors.mobile">{{formErrors.mobile}}</p>
                </div>
            </div>
            <div class="form-group">
                <div class="col-sm-2 control-label">email</div>
                <div class="col-sm-10">
                    <input type="text" class="form-control" :class="{'is-invalid': formErrors.email}" v-model="client.email" placeholder="email"/>
                    <p class="ops-field-error" v-if="formErrors.email">{{formErrors.email}}</p>
                </div>
            </div>
            <div class="form-group">
                <div class="col-sm-2 control-label">客户经理</div>
                <div class="col-sm-10">
                    <input type="text" class="form-control" v-model="client.customermanager" placeholder="客户经理"/>
                </div>
            </div>
            <div class="form-group ops-form-actions">
                <div class="col-sm-2 control-label"></div>
                <div class="col-sm-10">
                    <button type="button" class="btn btn-primary" :class="{'is-loading': saving}" :disabled="saving" @click="saveOrUpdate">
                        <span class="btn-text">{{saving ? "提交中" : "确定"}}</span>
                    </button>
                    <button type="button" class="btn btn-default ml-10" :disabled="saving" @click="reload">返回</button>
                </div>
            </div>
        </form>
    </div>

</div>

<script src="../public/libs/jquery.min.js"></script>
<script src="../public/plugins/layer/layer.js"></script>
<script src="../public/libs/bootstrap.min.js"></script>
<script src="../public/libs/vue.min.js"></script>
<script src="../public/libs/myindex.js"></script>
<script src="../public/plugins/bootstrap-table/bootstrap-table.min.js"></script>
<script src="../public/plugins/bootstrap-table/locale/bootstrap-table-zh-CN.min.js"></script>
<script src="../public/plugins/ztree/jquery.ztree.all.min.js"></script>
<script src="../public/js/common.js"></script>
<script src="../public/js/client/client.js"></script>
</body>
</html>
