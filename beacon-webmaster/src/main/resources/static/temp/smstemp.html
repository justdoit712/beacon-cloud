<!DOCTYPE html>
<html>
<head>
    <title>短信模板管理</title>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" name="viewport">
    <link rel="stylesheet" href="../public/css/bootstrap.min.css">
    <link rel="stylesheet" href="../public/css/font-awesome.min.css">
    <link rel="stylesheet" href="../public/plugins/bootstrap-table/bootstrap-table.min.css">
    <link rel="stylesheet" href="../public/css/main.css">
    <link rel="stylesheet" href="../public/css/theme.css">

</head>
<body class="ops-page">
<div id="dtapp" class="ops-page-container" v-cloak>

    <div v-show="showList" class="ops-page-layout">
        <div class="panel panel-default ops-list-panel">
            <div class="panel-heading ops-list-heading">
                <span class="ops-list-title">短信模板列表</span>
            </div>
            <div class="panel-body">
                <div id="toolbar" class="ops-toolbar">
                    <button v-if="hasPermission('sys:menu:save')" class="btn btn-success" type="button" @click="add">
                        <i class="fa fa-plus"></i>&nbsp;&nbsp;<span class="bold">新增</span>
                    </button>
                    <button v-if="hasPermission('sys:menu:update')" class="btn btn-success" type="button" @click="update">
                        <i class="fa fa-pencil-square-o"></i>&nbsp;&nbsp;<span class="bold">修改</span>
                    </button>
                    <button v-if="hasPermission('sys:menu:delete')" class="btn btn-danger" type="button" @click="del">
                        <i class="fa fa-remove"></i>&nbsp;&nbsp;<span class="bold">删除</span>
                    </button>
                </div>

                <table id="table" class="ops-table"></table>
            </div>
        </div>
    </div>

    <div v-show="!showList" class="panel panel-default page-form-layout ops-form-panel">
        <div class="panel-heading">{{title}}</div>
        <form class="form-horizontal ops-form">
            <div class="form-group">
                <div class="col-sm-2 control-label">签名ID</div>
                <div class="col-sm-10">
                    <input type="number" class="form-control" v-model="smstemplate.signId" placeholder="对应 client_sign.id"/>
                </div>
            </div>
            <div class="form-group">
                <div class="col-sm-2 control-label">模板内容</div>
                <div class="col-sm-10">
                    <input type="text" class="form-control" v-model="smstemplate.templateText" placeholder="短信模板内容"/>
                </div>
            </div>
            <div class="form-group">
                <div class="col-sm-2 control-label">模板类型</div>
                <div class="col-sm-10">
                    <div class="ops-inline-options">
                        <label><input type="radio" value="0" v-model="smstemplate.templateType">验证码类</label>
                        <label><input type="radio" value="1" v-model="smstemplate.templateType">通知类</label>
                        <label><input type="radio" value="2" v-model="smstemplate.templateType">营销类</label>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <div class="col-sm-2 control-label">审核状态</div>
                <div class="col-sm-10">
                    <div class="ops-inline-options">
                        <label><input type="radio" value="0" v-model="smstemplate.templateState">审核中</label>
                        <label><input type="radio" value="1" v-model="smstemplate.templateState">审核不通过</label>
                        <label><input type="radio" value="2" v-model="smstemplate.templateState">审核通过</label>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <div class="col-sm-2 control-label">使用场景</div>
                <div class="col-sm-10">
                    <div class="ops-inline-options">
                        <label><input type="radio" value="0" v-model="smstemplate.useId">网站</label>
                        <label><input type="radio" value="1" v-model="smstemplate.useId">APP</label>
                        <label><input type="radio" value="2" v-model="smstemplate.useId">微信</label>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <div class="col-sm-2 control-label">使用地址</div>
                <div class="col-sm-10">
                    <input type="text" class="form-control" v-model="smstemplate.useWeb" placeholder="网站地址、APP或微信使用场景说明"/>
                </div>
            </div>
            <div class="form-group ops-form-actions">
                <div class="col-sm-2 control-label"></div>
                <div class="col-sm-10">
                    <button type="button" class="btn btn-primary" @click="saveOrUpdate">确定</button>
                    <button type="button" class="btn btn-default ml-10" @click="reload">返回</button>
                </div>
            </div>
        </form>
    </div>

</div>

<script src="../public/libs/jquery.min.js"></script>
<script src="../public/js/common/auth.js"></script>
<script src="../public/plugins/layer/layer.js"></script>
<script src="../public/libs/bootstrap.min.js"></script>
<script src="../public/libs/vue.min.js"></script>
<script src="../public/plugins/bootstrap-table/bootstrap-table.min.js"></script>
<script src="../public/plugins/bootstrap-table/locale/bootstrap-table-zh-CN.min.js"></script>
<script src="../public/js/common.js"></script>
<script src="../public/js/temp/smstemp.js"></script>
</body>
</html>
