<!DOCTYPE html>
<html>
<head>
    <title>菜单管理</title>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" name="viewport">
    <link rel="stylesheet" href="../public/css/bootstrap.min.css">
    <link rel="stylesheet" href="../public/css/font-awesome.min.css">
    <link rel="stylesheet" href="../public/plugins/bootstrap-table/bootstrap-table.min.css">
    <link rel="stylesheet" href="../public/plugins/ztree/css/metroStyle/metroStyle.css">
    <link rel="stylesheet" href="../public/css/main.css">
    <link rel="stylesheet" href="../public/css/theme.css">

</head>
<body class="ops-page">
<div id="dtapp" class="ops-page-container" v-cloak>

    <div v-show="showList" class="ops-page-layout">
        <div class="panel panel-default ops-list-panel">
            <div class="panel-heading ops-list-heading">
                <span class="ops-list-title">菜单列表</span>
            </div>
            <div class="panel-body">
                <div id="toolbar" class="ops-toolbar">
                    <button v-if="hasPermission('sys:menu:save')" class="btn btn-success" type="button" @click="add">
                        <i class="fa fa-plus"></i>&nbsp;&nbsp;<span class="bold">新增</span>
                    </button>
                    <button v-if="hasPermission('sys:menu:update')" class="btn btn-success" type="button" @click="update">
                        <i class="fa fa-pencil-square-o"></i>&nbsp;&nbsp;<span class="bold">修改</span>
                    </button>
                    <button v-if="hasPermission('sys:menu:delete')" class="btn btn-danger" type="button" @click="del">
                        <i class="fa fa-remove"></i>&nbsp;&nbsp;<span class="bold">删除</span>
                    </button>
                </div>

                <table id="table" class="ops-table"></table>
            </div>
        </div>
    </div>

    <div v-show="!showList" class="panel panel-default page-form-layout ops-form-panel">
        <div class="panel-heading">{{title}}</div>
        <form class="form-horizontal ops-form">
            <div class="form-group">
                <div class="col-sm-2 control-label">类型</div>
                <div class="col-sm-10">
                    <div class="ops-inline-options">
                        <label><input type="radio" name="type" value="0" v-model="menu.type"/>目录</label>
                        <label><input type="radio" name="type" value="1" v-model="menu.type"/>菜单</label>
                        <label><input type="radio" name="type" value="2" v-model="menu.type"/>按钮</label>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <div class="col-sm-2 control-label">菜单名称</div>
                <div class="col-sm-10">
                    <input type="text" class="form-control" v-model="menu.name" placeholder="菜单名称或按钮名称"/>
                </div>
            </div>
            <div class="form-group">
                <div class="col-sm-2 control-label">上级菜单</div>
                <div class="col-sm-10">
                    <input type="text" class="form-control pointer" v-model="menu.parentName"
                           @click="menuTree" readonly="readonly" placeholder="一级菜单"/>
                </div>
            </div>
            <div v-if="menu.type == 1" class="form-group">
                <div class="col-sm-2 control-label">菜单URL</div>
                <div class="col-sm-10">
                    <input type="text" class="form-control" v-model="menu.url" placeholder="菜单URL"/>
                </div>
            </div>
            <div v-if="menu.type == 1 || menu.type == 2" class="form-group">
                <div class="col-sm-2 control-label">授权标识</div>
                <div class="col-sm-10">
                    <input type="text" class="form-control" v-model="menu.perms"
                           placeholder="多个用逗号分隔，如：user:list,user:create"/>
                </div>
            </div>
            <div class="form-group">
                <div class="col-sm-2 control-label">排序号</div>
                <div class="col-sm-10">
                    <input type="number" class="form-control" v-model="menu.orderNum" placeholder="排序号"/>
                </div>
            </div>
            <div v-if="menu.type != 2" class="form-group">
                <div class="col-sm-2 control-label">图标</div>
                <div class="col-sm-10">
                    <input type="text" class="form-control" v-model="menu.icon" placeholder="菜单图标"/>
                    <p class="help-block">获取图标：http://www.fontawesome.com.cn/faicons/</p>
                </div>
            </div>
            <div class="form-group ops-form-actions">
                <div class="col-sm-2 control-label"></div>
                <div class="col-sm-10">
                    <button type="button" class="btn btn-primary" @click="saveOrUpdate">确定</button>
                    <button type="button" class="btn btn-default ml-10" @click="reload">返回</button>
                </div>
            </div>
        </form>
    </div>

</div>

<!-- 选择菜单 -->
<div id="menuLayer" style="display: none;padding:10px;">
    <ul id="menuTree" class="ztree"></ul>
</div>

<script src="../public/libs/jquery.min.js"></script>
<script src="../public/plugins/layer/layer.js"></script>
<script src="../public/libs/bootstrap.min.js"></script>
<script src="../public/libs/vue.min.js"></script>
<script src="../public/plugins/bootstrap-table/bootstrap-table.min.js"></script>
<script src="../public/plugins/bootstrap-table/locale/bootstrap-table-zh-CN.min.js"></script>
<script src="../public/plugins/ztree/jquery.ztree.all.min.js"></script>
<script src="../public/js/common.js"></script>
<script src="../public/js/sys/menu.js"></script>
</body>
</html>
