<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Pie Chart</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" name="viewport">
    <link rel="stylesheet" href="../public/css/bootstrap.min.css">
    <link rel="stylesheet" href="../public/css/font-awesome.min.css">
    <link rel="stylesheet" href="../public/css/main.css">
    <link rel="stylesheet" href="../public/css/theme.css">
</head>
<body class="ops-page">
<div class="ops-page-container">
    <div class="ops-page-layout">
        <div class="panel panel-default ops-list-panel">
            <div class="panel-heading ops-list-heading">
                <span class="ops-list-title">Pie Chart</span>
            </div>
            <div class="panel-body">
                <div id="pieChart" class="ops-chart-canvas"></div>
            </div>
        </div>
    </div>
</div>

<script src="../public/libs/jquery.min.js"></script>
<script src="../public/plugins/echarts/echarts.min.js"></script>
<script>
    $(function () {
        var myEcharts = echarts.init(document.getElementById('pieChart'));
        var option = {
            title: {
                text: 'Success Rate',
                subtext: 'Real Data',
                x: 'center'
            },
            tooltip: {
                trigger: 'item',
                formatter: '{a} <br/>{b} : {c} ({d}%)'
            },
            legend: {
                orient: 'vertical',
                left: 'left',
                data: []
            },
            series: [
                {
                    name: 'Success Rate',
                    type: 'pie',
                    radius: '55%',
                    center: ['50%', '60%'],
                    data: [],
                    itemStyle: {
                        emphasis: {
                            shadowBlur: 10,
                            shadowOffsetX: 0,
                            shadowColor: 'rgba(0, 0, 0, 0.5)'
                        }
                    }
                }
            ]
        };

        $.ajax({
            url: '/sys/echarts/pie',
            dataType: 'json',
            success: function (r) {
                option.legend.data = r.legendData || [];
                option.series[0].data = r.seriesData || [];
                myEcharts.setOption(option);
            }
        });

        $(window).on('resize', function () {
            myEcharts.resize();
        });
    });
</script>
</body>
</html>
