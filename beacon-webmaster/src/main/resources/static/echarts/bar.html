<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Bar Chart</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" name="viewport">
    <link rel="stylesheet" href="../public/css/bootstrap.min.css">
    <link rel="stylesheet" href="../public/css/font-awesome.min.css">
    <link rel="stylesheet" href="../public/css/main.css">
    <link rel="stylesheet" href="../public/css/theme.css">
</head>
<body class="ops-page">
<div class="ops-page-container">
    <div class="ops-page-layout">
        <div class="panel panel-default ops-list-panel">
            <div class="panel-heading ops-list-heading">
                <span class="ops-list-title">Bar Chart</span>
            </div>
            <div class="panel-body">
                <div id="bar" class="ops-chart-canvas"></div>
            </div>
        </div>
    </div>
</div>

<script src="../public/libs/jquery.min.js"></script>
<script src="../public/plugins/echarts/echarts.min.js"></script>
<script>
    $(function () {
        var myEcharts = echarts.init(document.getElementById("bar"));
        var option = {
            xAxis: {
                type: 'category',
                data: []
            },
            yAxis: {
                type: 'value'
            },
            series: [{
                data: [],
                type: 'bar'
            }]
        };

        $.get('/sys/echarts/bar', function (r) {
            option.xAxis.data = r.xAxis || [];
            option.series[0].data = r.seriesData || [];
            myEcharts.setOption(option);
        });

        $(window).on('resize', function () {
            myEcharts.resize();
        });
    });
</script>
</body>
</html>
