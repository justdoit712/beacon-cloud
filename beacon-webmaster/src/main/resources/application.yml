# MyBatis和dataSource配置
spring:
  datasource:
    driver-class-name: org.gjt.mm.mysql.Driver
    url: jdbc:mysql://192.168.88.128:3306/duanxin_pingtai?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123
    type: com.alibaba.druid.pool.DruidDataSource

  # 服务名称
  application:
    name: beacon-webmaster
  # 多环境
  profiles:
    active: dev
  # nacos注册中心地址
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.88.128:8848
      # nacos配置中心地址:
      config:
        server-addr: 192.168.88.128:8848
        file-extension: yml
        # beacon-search-dev.yml

# MyBatis
mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true



shiro:
  # 默认登录页面
  loginUrl: /login.html
  # 没有权限的页面
  unauthorizedUrl: unauthorized.html

system:
  # 在本地开发环境，设置万能验证码为 1111
  test-kaptcha: "1111"

internal:
  balance:
    # webmaster internal balance debit token, empty means no check
    token: ""

sync:
  # 同步总开关：关闭后 runtime/manual/boot 子开关均不生效
  enabled: true
  redis:
    # 统一命名空间前缀，约定格式：beacon:{env}:{project}:{owner}:
    namespace: "beacon:dev:beacon-cloud:cz:"
  runtime:
    # 运行时同步开关（业务写路径触发）
    enabled: true
  manual:
    # 手工重建开关（管理入口触发）
    enabled: true
  boot:
    # 启动校准开关（服务启动触发）
    enabled: false
    # 启动校准域清单，留空表示由后续逻辑决定默认域策略
    domains: []

cache:
  client:
    auth:
      enabled: true
      # 必须与 beacon-cache 的 caller-secrets 配置一致
      caller: beacon-webmaster
      secret: cache_webmaster_secret
    feign:
      connect-timeout-ms: 3000
      read-timeout-ms: 5000

