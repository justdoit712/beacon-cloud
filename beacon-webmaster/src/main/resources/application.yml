# MyBatis和dataSource配置
spring:
  datasource:
    driver-class-name: org.gjt.mm.mysql.Driver
    url: jdbc:mysql://192.168.88.128:3306/duanxin_pingtai?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123
    type: com.alibaba.druid.pool.DruidDataSource

  # 服务名称
  application:
    name: beacon-webmaster
  # 多环境
  profiles:
    active: dev
  # nacos注册中心地址
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.88.128:8848
      # nacos配置中心地址:
      config:
        server-addr: 192.168.88.128:8848
        file-extension: yml
        # beacon-search-dev.yml

# MyBatis
mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true



shiro:
  # 默认登录页面
  loginUrl: /login.html
  # 没有权限的页面
  unauthorizedUrl: unauthorized.html

system:
  # 在本地开发环境，设置万能验证码为 1111
  test-kaptcha: "1111"
sms:
  internal:
    # optional token for calling beacon-api /sms/internal/single_send
    token: ""
